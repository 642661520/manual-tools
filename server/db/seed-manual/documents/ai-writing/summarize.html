<h1>AI 摘要生成</h1>
<p>AI 可以自动为文档内容生成结构化摘要。</p>
<h2>使用方式</h2>
<ol>
  <li>在编辑器中打开目标章节</li>
  <li>点击工具栏中的<strong>AI 摘要</strong>按钮</li>
  <li>AI 读取当前文档的全部内容</li>
  <li>生成包含要点的结构化摘要</li>
</ol>
<h2>摘要格式</h2>
<p>生成的摘要通常包括：</p>
<ul>
  <li>文档的核心主题概述</li>
  <li>关键操作步骤的概要</li>
  <li>重要注意事项的提炼</li>
</ul>
<p>摘要会插入到文档开头，您可以进一步编辑和调整。</p>
