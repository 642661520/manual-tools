<h1>AI 修正</h1>
<p>使用 AI 检查和修正文档中的问题。</p>
<h2>修正范围</h2>
<ul>
  <li><strong>语法错误</strong> — 修正错别字和语法问题</li>
  <li><strong>格式统一</strong> — 保持文档内格式风格一致</li>
  <li><strong>术语标准化</strong> — 统一专业术语的使用</li>
  <li><strong>标点规范</strong> — 修正中英文标点混用问题</li>
</ul>
<h2>使用方式</h2>
<ol>
  <li>选中需要检查的文本（不选则检查全文）</li>
  <li>点击<strong>AI 修正</strong>按钮</li>
  <li>AI 逐条显示发现的问题和建议修改</li>
  <li>可以选择逐条接受或一键全部修正</li>
</ol>
