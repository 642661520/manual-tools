<h1>AI 扩写</h1>
<p>基于已有内容进行扩展，补充更多细节和说明。</p>
<h2>适用场景</h2>
<ul>
  <li>将简短的功能说明扩展为详细的操作指南</li>
  <li>为步骤列表补充背景说明和原因解释</li>
  <li>为技术概念添加通俗易懂的类比说明</li>
  <li>生成更多的使用示例和最佳实践</li>
</ul>
<h2>使用方式</h2>
<ol>
  <li>选中要扩展的文本</li>
  <li>点击<strong>AI 扩写</strong>按钮</li>
  <li>选择扩写风格（详细/简洁/通俗）</li>
  <li>预览扩写结果并确认</li>
