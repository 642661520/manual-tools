<h1>创建目录</h1>
<p>目录（Catalog）用于将多个功能按顺序编排成完整手册。</p>
<h2>操作步骤</h2>
<ol>
  <li>确保已切换到目标项目</li>
  <li>点击左侧导航的<strong>目录编排</strong></li>
  <li>点击<strong>新建目录</strong>按钮</li>
  <li>填写目录信息：
    <ul>
      <li><strong>目录标题</strong> — 必填，最终手册的标题</li>
      <li><strong>目标受众</strong> — 可选，描述手册的预期读者</li>
    </ul>
  </li>
  <li>点击<strong>创建</strong></li>
</ol>
<h2>目录列表</h2>
<p>创建后，目录会出现在目录列表页面中。每个目录显示标题、包含的功能数量和最后更新时间。</p><div data-image-placeholder="catalog-building-create.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
