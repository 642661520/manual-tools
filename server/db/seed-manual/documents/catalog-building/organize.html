<h1>编排功能</h1>
<p>在目录编辑器中，您可以将功能从左侧池中选入右侧，编排手册结构。</p>
<h2>操作步骤</h2>
<ol>
  <li>在目录列表中点击目标目录进入编辑页面</li>
  <li>左侧显示当前项目所有可用的功能（支持搜索和按分类筛选）</li>
  <li>点击功能的<strong>+</strong>按钮将其添加到右侧已选列表</li>
  <li>在右侧拖拽功能调整其在手册中的排列顺序</li>
  <li>从右侧移除不需要的功能</li>
</ol>
<h2>搜索和筛选</h2>
<p>左侧功能池支持按功能名称搜索，按分类筛选，帮助您快速找到目标功能。</p>
<h2>自动保存</h2>
<p>编排操作会自动保存，无需手动确认。</p>
