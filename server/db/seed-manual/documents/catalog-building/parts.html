<h1>分区管理</h1>
<p>Part（分区）用于将目录中的功能按主题分组，使手册结构更清晰。</p>
<h2>创建分区</h2>
<ol>
  <li>在目录编辑页面，点击<strong>添加分区</strong></li>
  <li>输入分区标题（如"快速入门"、"进阶功能"）</li>
  <li>将功能拖入对应分区</li>
  <li>拖拽分区本身可以调整分区的排列顺序</li>
</ol>
<h2>效果</h2>
<p>
  分区在预览和导出的手册中显示为一级标题，其下的功能为二级标题。这为手册提供了更清晰的层级结构。
</p>
