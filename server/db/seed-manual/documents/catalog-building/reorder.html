<h1>章节排序</h1>
<p>添加到目录中的功能，其章节顺序可以单独调整。</p>
<h2>章节级别排序</h2>
<p>在目录编辑页面展开功能后，可以看到该功能的所有章节。拖拽章节可以调整它们在手册中的出现顺序。</p>
<h2>默认排序</h2>
<p>如果不手动调整，章节按照功能定义时的顺序排列。章节排序仅影响当前目录，不会修改功能本身的章节定义。</p><div data-image-placeholder="catalog-building-reorder.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
