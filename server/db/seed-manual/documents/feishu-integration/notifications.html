<h1>消息通知</h1>
<p>与飞书集成后，平台可以通过飞书机器人向用户推送消息。</p>
<h2>通知类型</h2>
<ul>
  <li><strong>审核分配通知</strong> — 当文档被提交审核时，通知审核链中的审核人</li>
  <li><strong>审核结果通知</strong> — 当审核通过或驳回时，通知文档作者</li>
  <li><strong>指派通知</strong> — 当文档被分配给您时，通知编写者</li>
</ul>
<h2>消息格式</h2>
<p>飞书消息使用卡片消息格式，包含：</p>
<ul>
  <li>通知标题和摘要</li>
  <li>相关项目和功能名称</li>
  <li>操作人信息</li>
  <li>跳转链接（点击可直接打开对应文档）</li>
</ul>
