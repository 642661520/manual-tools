<h1>草稿 PDF</h1>
<p>可以在正式发布前导出草稿 PDF 用于预览和校对。</p>
<h2>使用方式</h2>
<p>在目录编辑页面的预览模式中，点击<strong>导出草稿 PDF</strong>。草稿 PDF 包含当前所有文档的最新内容（包括未审核通过的章节）。</p>
<h2>用途</h2>
<ul>
  <li>发布前检查手册整体效果</li>
  <li>发送给审核人进行离线审核</li>
  <li>快速分享给团队成员征求意见</li>
