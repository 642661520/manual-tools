<h1>版本 PDF</h1>
<p>已发布版本可以导出为高质量 PDF 文件。</p>
<h2>与草稿的区别</h2>
<ul>
  <li>版本 PDF 使用发布时的文档快照，内容不会改变</li>
  <li>草稿 PDF 使用当前最新内容，随时变化</li>
  <li>版本 PDF 包含封面信息和版本号</li>
</ul>
<h2>导出设置</h2>
<p>版本 PDF 的默认页面大小为 A4。</p>
