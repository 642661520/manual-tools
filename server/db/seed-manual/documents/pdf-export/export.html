<h1>PDF 导出流程</h1>
<p>支持将手册导出为 PDF 文件，方便离线阅读和打印。</p>
<h2>导出方式</h2>
<p>在版本详情或预览页面，点击<strong>导出 PDF</strong>按钮。导出过程：</p>
<ol>
  <li>系统将手册渲染为 HTML 页面</li>
  <li>使用 Puppeteer（无头 Chromium）将 HTML 转换为 PDF</li>
  <li>应用页面布局和分页设置</li>
  <li>生成 PDF 文件供下载</li>
</ol>
<h2>导出内容</h2>
<p>PDF 包含封面页、目录页和完整的文档内容。图片和表格都会被保留，超链接转换为可点击的 PDF 链接。</p>
