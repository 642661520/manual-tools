<h1>编写任务</h1>
<p>在<strong>待办列表</strong>页面，您可以查看分配给自己的所有编写任务。</p>
<h2>任务来源</h2>
<ul>
  <li>管理员手动指派给您的文档章节</li>
  <li>您自己创建的文档（自动分配）</li>
  <li>驳回后重新分配给您的修改任务</li>
</ul>
<h2>任务信息</h2>
<p>每个编写任务显示：</p>
<ul>
  <li>所属项目和功能名称</li>
  <li>章节标题</li>
  <li>当前状态（in_progress 或 rejected）</li>
  <li>审核意见（如有驳回）</li>
  <li>跳转编辑按钮</li>
</ul>
<h2>快捷操作</h2>
<p>点击任务行可直接跳转到编辑器打开对应章节，快速开始编写。</p><div data-image-placeholder="todos-write-tasks.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
