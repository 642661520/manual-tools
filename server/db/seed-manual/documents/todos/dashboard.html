<h1>任务看板</h1>
<p>待办页面为您提供了一个集中的任务管理看板。</p>
<h2>页面布局</h2>
<p>待办页面分为两个标签页：</p>
<ul>
  <li><strong>编写任务</strong> — 需要您编写的文档章节列表</li>
  <li><strong>审核任务</strong> — 需要您审核的文档章节列表</li>
</ul>
<h2>任务统计</h2>
<p>每个标签页顶部显示任务总数，方便快速了解工作量。</p>
<h2>筛选功能</h2>
<ul>
  <li>按项目筛选任务</li>
  <li>按状态筛选（如只看驳回的编写任务）</li>
  <li>按提交时间排序</li>
</ul>
<h2>使用建议</h2>
<p>建议每天打开待办页面查看新任务，及时处理审核请求以保持文档编写流程的顺畅运转。</p><div data-image-placeholder="todos-dashboard.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
