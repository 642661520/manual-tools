<h1>审核任务</h1>
<p>在<strong>待办列表</strong>页面，您可以查看分配给自己的所有审核任务。</p>
<h2>任务来源</h2>
<p>当文档被提交审核，且您是当前审核步骤的审核人时，您会收到审核任务。</p>
<h2>任务信息</h2>
<p>每个审核任务显示：</p>
<ul>
  <li>提交人和提交时间</li>
  <li>所属项目和功能名称</li>
  <li>章节标题</li>
  <li>当前审核步骤（第几步/共几步）</li>
  <li>提交说明</li>
  <li>跳转审核按钮</li>
</ul>
<h2>审核操作</h2>
<p>点击任务进入编辑器后，可以查看文档完整内容，然后选择<strong>通过</strong>或<strong>驳回</strong>。驳回时需要填写驳回意见，帮助作者理解需要修改的内容。</p><div data-image-placeholder="todos-review-tasks.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
