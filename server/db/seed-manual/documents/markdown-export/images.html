<h1>图片引用处理</h1>
<p>导出 Markdown 时，文档中的图片引用会自动处理。</p>
<h2>处理方式</h2>
<ul>
  <li>Markdown 中使用相对路径引用图片</li>
  <li>图片文件一同打包到 ZIP 中</li>
  <li>导出后的 Markdown 可以在本地 Markdown 编辑器中正常查看</li>
</ul>
<h2>注意事项</h2>
<ul>
  <li>视频文件会一同打包到 ZIP 中</li>
  <li>交叉引用会转换为带章节锚点的可点击链接</li>
