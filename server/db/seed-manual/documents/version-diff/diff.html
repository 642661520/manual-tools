<h1>差异查看</h1>
<p>版本对比使用文本差异算法（diff）精确展示两个版本之间的内容变化。</p>
<h2>差异类型</h2>
<ul>
  <li><strong>新增</strong> — 新版本中新增的章节或段落（绿色高亮）</li>
  <li><strong>删除</strong> — 新版本中删除的章节或段落（红色高亮）</li>
  <li><strong>修改</strong> — 内容发生变化的章节（黄色高亮）</li>
  <li><strong>未变更</strong> — 两版本一致的章节（无标记）</li>
</ul>
<h2>筛选功能</h2>
<p>可以按差异类型筛选，只看某种类型的变更。这对于审查大量变更时非常有用。</p>
