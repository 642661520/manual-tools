<h1>版本对比界面</h1>
<p>可以对比同一目录的任意两个已发布版本，查看文档变更。</p>
<h2>操作方式</h2>
<ol>
  <li>在目录详情页面进入<strong>版本管理</strong></li>
  <li>选择两个要对比的版本（左侧为旧版本，右侧为新版本）</li>
  <li>点击<strong>对比</strong>按钮</li>
</ol>
<h2>对比视图</h2>
<p>对比界面分为两部分：</p>
<ul>
  <li><strong>左侧导航</strong> — 显示有变更的章节列表（新增/修改/删除标记）</li>
  <li><strong>右侧内容</strong> — 并排或统一显示两个版本的差异，修改部分高亮标记</li>
</ul>
