<h1>编辑分类</h1>
<p>您可以随时修改分类的名称和颜色标识。</p>
<h2>操作步骤</h2>
<ol>
  <li>打开<strong>管理分类</strong>对话框</li>
  <li>在分类列表中，点击要编辑的分类行</li>
  <li>修改名称或颜色</li>
  <li>点击<strong>保存</strong>按钮确认修改，或点击<strong>取消</strong>放弃修改</li>
</ol>
<h2>影响范围</h2>
<ul>
  <li>修改分类名称会立即反映在功能列表的分组标题中</li>
  <li>修改颜色标识会更新分类圆点的颜色</li>
  <li>不影响已归属该分类的功能数量</li>
