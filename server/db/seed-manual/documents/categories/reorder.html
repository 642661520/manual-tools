<h1>分类排序</h1>
<p>通过拖拽可以调整分类在功能列表中的显示顺序。</p>
<h2>操作步骤</h2>
<ol>
  <li>打开<strong>管理分类</strong>对话框</li>
  <li>在分类列表中，使用拖拽手柄（六点图标）上下拖拽分类</li>
  <li>松开鼠标后，排序会自动保存</li>
</ol>
<h2>排序效果</h2>
<ul>
  <li>功能列表中的分组顺序与分类排序一致</li>
  <li>新建功能时，分类下拉列表也按此顺序排列</li>
  <li>未分类的功能始终显示在最后</li>
</ul>
