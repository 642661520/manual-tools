<h1>删除分类</h1>
<p>删除分类前，系统会检查该分类下是否有关联的功能。</p>
<h2>操作步骤</h2>
<ol>
  <li>打开<strong>管理分类</strong>对话框</li>
  <li>点击分类行右侧的删除按钮</li>
  <li>系统会显示该分类下的功能数量</li>
  <li>确认删除</li>
</ol>
<h2>注意事项</h2>
<ul>
  <li>删除分类后，原本归属该分类的功能将变为<strong>未分类</strong></li>
  <li>删除操作不可恢复，建议先将功能迁移到其他分类</li>
  <li>已发布的目录版本不受影响（版本已包含发布时的分类快照）</li>
</ul>
