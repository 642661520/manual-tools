<h1>操作记录</h1>
<p>系统自动记录以下类型的操作：</p>
<h2>记录范围</h2>
<ul>
  <li><strong>用户管理</strong> — 创建用户、删除用户、修改角色</li>
  <li><strong>项目管理</strong> — 创建项目、删除项目、修改设置</li>
  <li><strong>成员管理</strong> — 添加成员、移除成员、修改角色</li>
  <li><strong>功能管理</strong> — 创建/编辑/删除功能、批量导入</li>
  <li><strong>文档操作</strong> — 状态变更、提交审核、审核通过/驳回</li>
  <li><strong>目录管理</strong> — 创建/编辑/删除目录、版本发布</li>
  <li><strong>数据操作</strong> — 项目导入导出、系统备份</li>
</ul>
<h2>日志保留</h2>
<p>审计日志目前存储在数据库中，无自动过期机制。建议定期检查日志量，必要时手动清理旧日志。</p>
