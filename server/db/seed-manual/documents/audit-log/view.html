<h1>日志查看</h1>
<p>在<strong>系统设置</strong> → <strong>操作日志</strong>中可以查看系统中的所有重要操作记录。</p>
<h2>日志内容</h2>
<p>每条日志记录包含：</p>
<ul>
  <li>操作人和用户名</li>
  <li>操作类型（创建、更新、删除等）</li>
  <li>操作目标类型和 ID</li>
  <li>操作详情</li>
  <li>操作时间</li>
</ul>
<h2>筛选功能</h2>
<p>
  支持按操作类型筛选日志，如只查看删除操作或权限变更操作。日志默认按时间倒序排列，最新的操作显示在前面。
</p>
