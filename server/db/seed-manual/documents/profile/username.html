<h1>修改用户名</h1>
<p>用户名是登录系统时使用的账号标识。</p>
<h2>修改步骤</h2>
<ol>
  <li>进入<strong>个人资料</strong>页面</li>
  <li>在用户名字段中输入新用户名</li>
  <li>点击<strong>保存</strong></li>
</ol>
<h2>注意事项</h2>
<ul>
  <li>用户名必须是系统中唯一的，不可与其他用户重复</li>
  <li>修改用户名后，下次登录需使用新用户名</li>
  <li>修改用户名会使所有旧 JWT Token 失效，需要重新登录</li>
</ul>
