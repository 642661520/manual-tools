<h1>修改显示名称</h1>
<p>显示名称是您在平台中的展示名称，会出现在协同编辑的光标提示和审核日志中。</p>
<h2>修改步骤</h2>
<ol>
  <li>点击右上角用户头像 → <strong>个人资料</strong></li>
  <li>在显示名称字段中输入新名称</li>
  <li>点击<strong>保存</strong></li>
</ol>
<h2>注意事项</h2>
<ul>
  <li>显示名称不等于用户名，不影响登录</li>
  <li>建议使用真实姓名或常用的称呼</li>
  <li>修改后所有协作者会立即看到新名称</li>
