<h1>修改密码</h1>
<p>定期修改密码是保护账号安全的好习惯。</p>
<h2>修改步骤</h2>
<ol>
  <li>进入<strong>个人资料</strong>页面</li>
  <li>在修改密码区域填写<strong>当前密码</strong>和<strong>新密码</strong></li>
  <li>点击<strong>修改密码</strong></li>
</ol>
<h2>安全建议</h2>
<ul>
  <li>密码长度不少于 8 位</li>
  <li>建议包含字母、数字和特殊字符</li>
  <li>不要使用与其他平台相同的密码</li>
  <li>修改密码后所有旧 JWT Token 失效，需要重新登录</li>
