<h1>系统备份</h1>
<p>系统级数据库备份功能可以备份整个 SQLite 数据库文件。</p>
<h2>备份方式</h2>
<p>在<strong>系统设置</strong> → <strong>备份恢复</strong>中，可以：</p>
<ul>
  <li><strong>创建备份</strong> — 生成当前数据库的完整副本</li>
  <li><strong>下载备份</strong> — 下载备份文件到本地</li>
</ul>
<h2>备份建议</h2>
<ul>
  <li>定期创建系统备份（建议每周一次）</li>
  <li>在进行大规模数据变更前先备份</li>
  <li>备份文件保存到安全的位置</li>
  <li>结合项目导出功能进行双重保护</li>
</ul>
