<h1>差异分析</h1>
<p>导入前系统会自动进行差异分析，让您清楚了解导入会带来哪些变化。</p>
<h2>分析结果</h2>
<p>差异报告显示：</p>
<ul>
  <li><strong>新增</strong> — 导入数据中有但当前项目中没有的条目数量</li>
  <li><strong>冲突</strong> — 两方都有的条目（按 ID 匹配）</li>
  <li><strong>上传文件</strong> — 将复制到上传目录的文件数量和总大小</li>
</ul>
<h2>决策辅助</h2>
<p>对于每个冲突条目，系统会显示源名称和目标名称，帮助您做出跳过或覆盖的决策。</p><div data-image-placeholder="data-import-export-diff.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
