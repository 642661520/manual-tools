<h1>项目导入</h1>
<p>支持从 ZIP 文件导入项目数据，可用于数据迁移和恢复。</p>
<h2>导入流程</h2>
<ol>
  <li>进入<strong>项目设置</strong> → <strong>数据管理</strong></li>
  <li>点击<strong>导入项目</strong>，选择 ZIP 文件上传</li>
  <li>系统分析 ZIP 内容并与当前项目对比</li>
  <li>在差异确认界面查看将新增和冲突的条目</li>
  <li>对冲突条目选择处理策略（覆盖/跳过）</li>
  <li>确认后执行导入</li>
</ol>
<h2>冲突处理</h2>
<p>
  当导入数据中的实体（分类、功能、目录、文档）ID
  与当前项目冲突时，您可以为每个实体单独选择覆盖或跳过策略。
</p>
