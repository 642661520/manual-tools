<h1>系统角色说明</h1>
<p>每个用户有一个系统级角色，控制其在平台中的整体权限。</p>
<h2>角色定义</h2>
<table>
  <tr><th>角色</th><th>权限范围</th></tr>
  <tr><td><strong>Admin（系统管理员）</strong></td><td>拥有所有权限：管理项目、用户、系统设置、数据导入导出。对所有项目自动拥有 PM 权限</td></tr>
  <tr><td><strong>Member（普通成员）</strong></td><td>可以加入项目并按项目角色工作。无法访问系统设置</td></tr>
  <tr><td><strong>Guest（访客）</strong></td><td>只能查看已登录用户可访问的公开文档。无法加入项目</td></tr>
</table>
<h2>角色修改</h2>
<p>Admin 可以修改其他用户的系统角色。所有用户都无法修改自己的角色。</p><div data-image-placeholder="user-management-roles.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
