<h1>查看用户</h1>
<p>在用户管理页面可以查看系统中所有已注册用户。</p>
<h2>用户列表</h2>
<p>列表显示每个用户的：</p>
<ul>
  <li>用户名和显示名称</li>
  <li>系统角色（Admin / Member / Guest）</li>
  <li>飞书绑定状态（是否已绑定飞书账号）</li>
  <li>创建时间</li>
</ul>
<h2>筛选</h2>
<p>支持在前端按用户名快速筛选，定位目标用户。</p>
