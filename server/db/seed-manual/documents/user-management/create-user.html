<h1>创建用户</h1>
<p>系统管理员（Admin）可以在设置页面创建新用户。</p>
<h2>操作步骤</h2>
<ol>
  <li>进入<strong>系统设置</strong> → <strong>用户管理</strong>标签页</li>
  <li>点击<strong>新建用户</strong>按钮</li>
  <li>填写用户信息：
    <ul>
      <li><strong>用户名</strong> — 必填，用于登录</li>
      <li><strong>显示名称</strong> — 可选，在界面中展示</li>
      <li><strong>密码</strong> — 必填，初始登录密码</li>
      <li><strong>角色</strong> — 选择 Admin / Member / Guest</li>
    </ul>
  </li>
  <li>点击<strong>创建</strong></li>
</ol>
<h2>密码要求</h2>
<p>初始密码建议使用强密码。用户登录后可以在个人资料页面自行修改密码。</p><div data-image-placeholder="user-management-create-user.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
