<h1>章节导航</h1>
<p>预览页面提供便捷的章节导航功能。</p>
<h2>导航方式</h2>
<ul>
  <li><strong>左侧目录树</strong> — 完整的手册结构树，点击即可跳转</li>
  <li><strong>锚点链接</strong> — 每个标题自带锚点，可复制链接分享</li>
  <li><strong>滚动高亮</strong> — 滚动阅读时目录树自动高亮当前位置</li>
</ul>
<h2>响应式设计</h2>
<p>在移动设备上，左侧目录树自动折叠为可展开的汉堡菜单，节省屏幕空间。</p>
