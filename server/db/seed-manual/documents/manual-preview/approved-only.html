<h1>仅审核通过模式</h1>
<p>预览时可以切换到"仅审核通过"模式，只显示已完成审核的文档内容。</p>
<h2>切换方式</h2>
<p>在预览页面顶部有<strong>仅审核通过</strong>的切换开关。开启后：</p>
<ul>
  <li>只有状态为 approved 的章节会显示内容</li>
  <li>未审核通过的章节显示占位提示</li>
  <li>目录中区分已通过和未通过的章节</li>
</ul>
<h2>使用场景</h2>
<ul>
  <li>正式发布前确认仅包含已审核内容</li>
  <li>向外部人员展示手册时仅展示已通过的内容</li>
</ul>
