<h1>更新机制</h1>
<p>静态站点会随着版本发布自动更新。</p>
<h2>更新流程</h2>
<ol>
  <li>文档内容修改和审核</li>
  <li>发布新版本</li>
  <li>系统自动重新构建静态站点</li>
  <li>新版本在 <code>/latest/</code> 路径下立即可用</li>
  <li>旧版本站点保持不变，通过版本切换器仍可访问</li>
</ol>
<h2>版本共存</h2>
<p>多个版本的静态站点可以同时存在并独立访问。用户可以随时切换到以前的版本查看历史文档。</p>
