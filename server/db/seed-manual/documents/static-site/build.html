<h1>自动构建</h1>
<p>每次发布版本后，系统会自动生成静态文档站点。</p>
<h2>构建内容</h2>
<p>发布的静态站点包含：</p>
<ul>
  <li>完整手册内容的 HTML 页面</li>
  <li>左侧导航边栏和章节目录</li>
  <li>版本切换器（可切换到其他已发布版本）</li>
  <li>全文搜索功能（前端倒排索引）</li>
  <li>响应式布局样式</li>
</ul>
<h2>存储位置</h2>
<p>静态站点文件存储在 <code>data/docs/{catalogId}/{version}/</code> 目录下。</p>
<h2>触发方式</h2>
<p>发布版本时自动触发构建。如果需要手动重建（如修改了站点模板），可以在版本管理中重新发布。</p>
