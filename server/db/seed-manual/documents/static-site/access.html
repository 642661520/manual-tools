<h1>站点访问</h1>
<p>已发布的文档站点通过 <code>/docs/</code> 路径访问。</p>
<h2>访问地址</h2>
<p>格式为 <code>/docs/{catalogId}/</code>。访问 <code>/latest/</code> 会自动重定向到最新版本。站点支持：</p>
<ul>
  <li><strong>版本切换</strong> — 在已发布的版本之间切换</li>
  <li><strong>搜索</strong> — 在当前版本中全文搜索文档内容</li>
  <li><strong>导航</strong> — 左侧边栏展示手册目录结构</li>
</ul>
<h2>访问控制</h2>
<p>根据发布时设置的可见性级别，未登录用户或非项目成员访问受限制的文档时会看到登录提示页面。</p><div data-image-placeholder="static-site-access.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
