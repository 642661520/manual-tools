<h1>版本号规则</h1>
<p>平台使用<strong>语义化版本号</strong>（Semantic Versioning），格式为 major.minor。</p>
<h2>版本号含义</h2>
<ul>
  <li><strong>Major（主版本号）</strong> — 手册结构发生重大变化时递增（如新增/删除大量功能）</li>
  <li><strong>Minor（次版本号）</strong> — 文档内容更新、修正时递增</li>
</ul>
<h2>自动递增</h2>
<p>
  系统会根据目录的上一个发布版本自动计算下一版本号。首次发布从 1.0 开始。您也可以手动指定版本号。
</p>
<h2>版本管理</h2>
<p>所有已发布版本都保存在版本列表中，可以查看每个版本的发布信息、变更说明和发布时间。</p>
