<h1>发布流程</h1>
<p>将编排好的目录发布为版本快照，使其在静态站点中可见。</p>
<h2>操作步骤</h2>
<ol>
  <li>在目录编辑页面点击<strong>发布</strong>按钮</li>
  <li>确认发布信息：
    <ul>
      <li><strong>版本号</strong> — 自动递增（major.minor 格式）</li>
      <li><strong>变更说明</strong> — 描述此版本的主要变更</li>
      <li><strong>可见性</strong> — 选择谁可以访问发布的文档</li>
    </ul>
  </li>
  <li>点击<strong>确认发布</strong></li>
</ol>
<h2>发布后</h2>
<ul>
  <li>系统生成当前所有文档内容的完整快照</li>
  <li>自动构建静态文档站点</li>
  <li>版本记录保存到版本历史中</li>
  <li>已发布版本的内容不会受后续文档编辑影响</li>
