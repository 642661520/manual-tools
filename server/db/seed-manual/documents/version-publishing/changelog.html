<h1>变更记录</h1>
<p>每次发布版本时，建议填写变更说明（Changelog），方便版本追踪。</p>
<h2>填写内容</h2>
<p>变更说明可以包括：</p>
<ul>
  <li>新增了哪些功能章节</li>
  <li>修改了哪些文档内容</li>
  <li>修复了哪些错误</li>
  <li>哪些章节重新审核通过</li>
</ul>
<h2>查看变更</h2>
<p>在版本列表中可以看到每个版本的变更说明。版本对比功能可以查看两个版本之间的详细差异。</p>
