<h1>可见性控制</h1>
<p>发布版本时可以选择三种可见性级别，控制文档站点的访问权限。</p>
<h2>三种级别</h2>
<table>
  <tr>
    <th>可见性</th>
    <th>访问条件</th>
    <th>适用场景</th>
  </tr>
  <tr>
    <td><strong>public（公开）</strong></td>
    <td>无需登录，任何人可访问</td>
    <td>面向客户的产品文档</td>
  </tr>
  <tr>
    <td><strong>login_required（需登录）</strong></td>
    <td>需登录平台，不限项目</td>
    <td>面向内部员工的操作手册</td>
  </tr>
  <tr>
    <td><strong>project_members（项目成员）</strong></td>
    <td>需登录且为该项目成员</td>
    <td>仅团队内部使用的文档</td>
  </tr>
</table>
<h2>修改可见性</h2>
<p>已发布版本的可见性可以随时修改，修改后立即生效。</p>
