<h1>移除成员</h1>
<p>项目管理员可以从项目中移除成员。</p>
<h2>操作步骤</h2>
<ol>
  <li>在成员列表中找到要移除的成员</li>
  <li>点击该成员行右侧的<strong>移除</strong>按钮</li>
  <li>在确认对话框中确认移除操作</li>
</ol>
<h2>注意事项</h2>
<ul>
  <li>移除成员后，该用户将无法访问该项目的数据</li>
  <li>该用户已创建的文档内容不会丢失</li>
  <li>该用户在该项目中的审核任务将被取消</li>
  <li>如果该用户是审核链中的审核人，建议先调整审核链配置</li>
</ul>
