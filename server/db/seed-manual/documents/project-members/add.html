<h1>添加成员</h1>
<p>项目管理员（PM）可以在项目设置中添加新成员。</p>
<h2>操作步骤</h2>
<ol>
  <li>进入<strong>项目设置</strong> → <strong>成员管理</strong>标签页</li>
  <li>点击<strong>添加成员</strong>按钮</li>
  <li>从用户下拉列表中选择目标用户</li>
  <li>从下拉列表中选择目标用户</li>
  <li>选择成员角色（PM / Writer / Viewer）</li>
  <li>点击<strong>确认添加</strong></li>
</ol>
<h2>前提条件</h2>
<ul>
  <li>目标用户必须已在系统中注册</li>
  <li>如果目标用户已是项目成员，则更新其角色</li>
</ul>
