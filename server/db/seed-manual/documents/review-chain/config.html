<h1>审核流程配置</h1>
<p>审核链允许您定义文档的多步审核流程，确保文档经过必要的审批环节。</p>
<h2>配置位置</h2>
<p>在<strong>项目设置</strong> → <strong>审核流程</strong>标签页中进行配置。</p>
<h2>配置方式</h2>
<ol>
  <li>从项目成员中选择审核人</li>
  <li>拖拽调整审核人的顺序</li>
  <li>审核将按照列表顺序依次进行</li>
  <li>第一个审核人通过后，自动流转到下一个审核人</li>
  <li>最后一个审核人通过后，文档状态变为 approved</li>
</ol>
<h2>审核人要求</h2>
<ul>
  <li>审核人必须是该项目的成员</li>
  <li>审核人可以是 PM 或 Writer 角色</li>
  <li>同一用户可以出现在审核链的多个位置</li>
</ul>
