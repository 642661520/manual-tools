<h1>直接通过审核</h1>
<p>PM（项目管理员）可以跳过审核链，直接通过文档审核。</p>
<h2>使用场景</h2>
<ul>
  <li>紧急文档需要快速发布</li>
  <li>审核链中的审核人不在线</li>
  <li>PM 已亲自审核内容，无需走完整流程</li>
</ul>
<h2>操作方式</h2>
<p>PM 在编辑器的状态操作区域可以看到<strong>直接通过</strong>按钮。点击后：</p>
<ol>
  <li>文档状态直接变为 approved</li>
  <li>跳过所有审核链步骤</li>
  <li>审核日志记录为"直接通过"</li>
  <li>审核链中未执行的步骤被标记为跳过</li>
</ol>
<h2>权限</h2>
<ul>
  <li>仅 PM 角色可以使用直接通过</li>
  <li>系统管理员（Admin）也具有此权限</li>
