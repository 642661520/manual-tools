<h1>图片上传</h1>
<p>平台支持在文档中嵌入图片，提供多种便捷的上传方式。</p>
<h2>上传方式</h2>
<ul>
  <li><strong>工具栏上传</strong> — 点击图片按钮，选择本地文件</li>
  <li><strong>拖拽上传</strong> — 将图片文件拖入编辑区域</li>
  <li><strong>剪贴板粘贴</strong> — Ctrl+V 粘贴剪贴板中的图片</li>
</ul>
<h2>存储位置</h2>
<p>上传的图片存储于 <code>data/uploads/images/</code> 目录，使用 SHA-256 哈希作为文件名进行去重。相同内容的图片只会存储一份。</p>
<h2>支持的格式</h2>
<p>PNG、JPG/JPEG、GIF、WebP、SVG、BMP 等常见格式。</p><div data-image-placeholder="media-upload-image.png" style="background:#f1f5f9;border:2px dashed #94a3b8;border-radius:8px;padding:20px 24px;text-align:center;color:#64748b;margin:16px 0;font-size:14px;">
