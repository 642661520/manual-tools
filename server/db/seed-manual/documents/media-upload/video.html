<h1>视频上传</h1>
<p>支持在文档中嵌入本地视频文件。</p>
<h2>上传方式</h2>
<p>点击工具栏中的<strong>视频</strong>按钮，选择本地视频文件上传。</p>
<h2>支持的格式</h2>
<p>MP4、WebM、AVI、MOV 等常见格式。推荐使用 MP4（H.264 编码）以获得最佳兼容性。</p>
<h2>存储位置</h2>
<p>视频文件存储于 <code>data/uploads/videos/</code> 目录，同样使用 SHA-256 哈希去重。</p>
