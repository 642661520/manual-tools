<h1>索引重建</h1>
<p>搜索索引在服务器启动时自动重建，确保搜索结果的准确性。</p>
<h2>自动重建</h2>
<p>每次服务器启动时，系统会：</p>
<ol>
  <li>清空现有搜索索引</li>
  <li>读取所有项目的所有文档内容</li>
  <li>重建搜索索引</li>
</ol>
<h2>手动重建</h2>
<p>
  管理员可以通过 API <code>POST /api/v1/search/rebuild</code>（请求体传入
  <code>{ projectId: "xxx" }</code>）手动触发指定项目的搜索索引重建，无需重启服务器。
</p>
<h2>索引性能</h2>
<p>索引重建的时间取决于文档总量，通常在几秒到几十秒之间完成。</p>
