<h1>编辑项目</h1>
<p>系统管理员（Admin 角色）可以在系统设置中修改项目的基本信息。</p>
<h2>操作步骤</h2>
<ol>
  <li>确保已切换到目标项目</li>
  <li>进入<strong>项目设置</strong>页面</li>
  <li>
    在<strong>基本信息</strong>区域修改：
    <ul>
      <li><strong>项目名称</strong> — 修改后影响页面标题和导出文件名</li>
      <li><strong>项目描述</strong> — 修改项目的说明信息</li>
    </ul>
  </li>
  <li>点击<strong>保存</strong>按钮</li>
</ol>
<h2>注意事项</h2>
<ul>
  <li>项目名称建议使用简洁明了的中文名称</li>
  <li>导出 ZIP 文件名会使用项目名称，请避免使用特殊字符</li>
  <li>修改项目信息不需要重新发布，立即生效</li>
</ul>
