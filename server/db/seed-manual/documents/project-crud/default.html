<h1>默认项目说明</h1>
<p><strong>默认项目</strong>是平台首次启动时自动创建的特殊项目，具有以下特点：</p>
<h2>特点</h2>
<ul>
  <li><strong>自动创建</strong> — 数据库初始化时自动生成，无需手动创建</li>
  <li><strong>不可删除</strong> — 保证平台始终有一个可用项目</li>
  <li>
    <strong>预置内容</strong> —
    包含本使用手册的完整功能结构和文档内容，首次启动时通过种子数据自动导入
  </li>
</ul>
<h2>使用建议</h2>
<p>您可以将默认项目作为：</p>
<ol>
  <li><strong>学习参考</strong> — 查看本手册的组织方式，了解平台的最佳实践</li>
  <li><strong>实际使用</strong> — 直接在默认项目中编写您的文档</li>
  <li><strong>模板项目</strong> — 导出默认项目作为其他项目的起始模板</li>
</ol>
