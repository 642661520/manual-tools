<h1>删除项目</h1>
<p>系统管理员可以删除不再需要的项目。<strong>删除操作不可逆，请谨慎操作。</strong></p>
<h2>删除前确认</h2>
<p>删除项目前请确认以下内容：</p>
<ul>
  <li>已备份项目数据（使用导出功能）</li>
  <li>项目中不再有需要保留的内容</li>
</ul>
<h2>级联影响</h2>
<p>删除项目会<strong>级联删除</strong>以下所有关联数据：</p>
<ul>
  <li>项目的所有分类</li>
  <li>项目的所有功能及其文档内容</li>
  <li>项目的所有目录和发布版本</li>
  <li>项目的所有成员关联</li>
</ul>
<h2>限制</h2>
<ul>
  <li><strong>默认项目不可删除</strong> — 系统默认项目受到保护</li>
  <li>仅 Admin 角色可以删除项目</li>
</ul>
